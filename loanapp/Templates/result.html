<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
</head>
<body>
    <h2>Applicant Details</h2>

    Income: {{ loan.applicant_income }} <br>
    Credit Score: {{ loan.credit_score }} <br>
    Loan Amount: {{ loan.loan_amount }} <br>
    Employment: {{ loan.employment_status }} <br><br>

    {% if loan.prediction_result == "Approved" %}
        <h3 style="color:green;">Loan Approved ✅</h3>
    {% else %}
        <h3 style="color:red;">Loan Rejected ❌</h3>
    {% endif %}
</body>
</html>
